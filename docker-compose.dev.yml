version: '3.8'

services:
  altme-bot-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: altme-bot-dev
    env_file: .env
    restart: unless-stopped
    volumes:
      - altme-dev-logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - dokploy-network

volumes:
  altme-dev-logs:

networks:
  dokploy-network:
    external: true
