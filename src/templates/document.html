<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refined Warm Editorial</title>
<style>
  :root {
    --c-bg: #faf8f5;
    --c-bg-surface: #ffffff;
    --c-bg-surface-alt: #f5f2ed;
    --c-text: #2c2418;
    --c-text-secondary: #7a6e5e;
    --c-accent: #c2850c;
    --c-accent-dark: #9a6a08;
    --c-accent-light: #f5e6c8;
    --c-border: #e8e2d8;
    --c-border-light: #f0ebe3;
    --c-shadow: 0 1px 3px rgba(0,0,0,0.03);
    --c-shadow-hover: 0 4px 12px rgba(194,133,12,0.06);
    --c-radius: 8px;
    --c-radius-sm: 6px;
    --c-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --c-callout-info-bg: #eef3fa;
    --c-callout-info-border: #5b8cc9;
    --c-callout-warning-bg: #fef7e8;
    --c-callout-warning-border: #d4960a;
    --c-callout-tip-bg: #edf7f0;
    --c-callout-tip-border: #3a9e5c;
    --c-callout-note-bg: #f5f0fa;
    --c-callout-note-border: #8b6cb0;
    --c-table-stripe: #faf7f2;
    --c-table-hover: #f5f0e8;
    --c-tab-bg: #f0ebe3;
    --c-tab-active-bg: #ffffff;
    --c-tab-active-border: #c2850c;
    --c-source-bg: #f5f2ed;
    --c-source-hover: #ebe6dc;
    --c-geo-color: #9a6a08;
    --c-hr-color: #e0d8cc;
    --c-quote-mark: #d4c5a0;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --c-bg: #1a1814;
      --c-bg-surface: #242018;
      --c-bg-surface-alt: #2a261e;
      --c-text: #e8e2d5;
      --c-text-secondary: #a89e8c;
      --c-accent: #e8a832;
      --c-accent-dark: #f0bc50;
      --c-accent-light: #3d3018;
      --c-border: #3a3428;
      --c-border-light: #302c22;
      --c-shadow: 0 1px 3px rgba(0,0,0,0.15);
      --c-shadow-hover: 0 4px 12px rgba(232,168,50,0.08);
      --c-callout-info-bg: #182030;
      --c-callout-info-border: #4a7ab8;
      --c-callout-warning-bg: #2c2210;
      --c-callout-warning-border: #c88a08;
      --c-callout-tip-bg: #142218;
      --c-callout-tip-border: #2d8a4a;
      --c-callout-note-bg: #221830;
      --c-callout-note-border: #7a5ca0;
      --c-table-stripe: #1e1c16;
      --c-table-hover: #2e2a1e;
      --c-tab-bg: #2a261e;
      --c-tab-active-bg: #302c22;
      --c-tab-active-border: #e8a832;
      --c-source-bg: #2a261e;
      --c-source-hover: #36302a;
      --c-geo-color: #f0bc50;
      --c-hr-color: #3a3428;
      --c-quote-mark: #5a4e32;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--c-font);
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.8;
    font-size: 17px;
    padding: 32px 16px;
    max-width: 680px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-family: var(--c-font);
    font-size: 2.2em;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
    line-height: 1.2;
    color: var(--c-text);
  }
  h1::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: var(--c-accent);
    margin-top: 16px;
    margin-bottom: 24px;
    border-radius: 2px;
  }

  h2 {
    font-family: var(--c-font);
    font-size: 1.5em;
    font-weight: 700;
    margin-top: 48px;
    margin-bottom: 16px;
    letter-spacing: -0.01em;
    color: var(--c-text);
  }

  h3 {
    font-family: var(--c-font);
    font-size: 1.2em;
    font-weight: 700;
    margin-top: 32px;
    margin-bottom: 12px;
  }

  p { margin-bottom: 16px; }

  hr {
    border: none;
    height: 1px;
    background: var(--c-hr-color);
    margin: 32px 0;
  }

  a {
    color: var(--c-accent);
    text-decoration: underline;
    text-decoration-color: rgba(194, 133, 12, 0.3);
    text-underline-offset: 3px;
    transition: text-decoration-color 0.2s;
  }
  a:hover {
    text-decoration-color: var(--c-accent);
  }

  /* Callouts */
  .callout {
    border-radius: var(--c-radius);
    padding: 18px 22px;
    margin: 24px 0;
    border-left: 4px solid;
    font-size: 0.95em;
  }
  .callout-title {
    font-family: var(--c-font);
    font-weight: 700;
    margin-bottom: 6px;
    font-size: 1em;
  }
  .callout-info { background: var(--c-callout-info-bg); border-color: var(--c-callout-info-border); }
  .callout-warning { background: var(--c-callout-warning-bg); border-color: var(--c-callout-warning-border); }
  .callout-tip { background: var(--c-callout-tip-bg); border-color: var(--c-callout-tip-border); }
  .callout-note { background: var(--c-callout-note-bg); border-color: var(--c-callout-note-border); }

  /* Accordion — CSS-only smooth animation */
  .accordion { margin: 20px 0; }
  .accordion-item {
    background: var(--c-bg-surface);
    border: 1px solid var(--c-border);
    border-radius: var(--c-radius);
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: var(--c-shadow);
    transition: box-shadow 0.2s;
  }
  .accordion-item:hover { box-shadow: var(--c-shadow-hover); }
  .accordion-header {
    padding: 16px 22px;
    cursor: pointer;
    font-family: var(--c-font);
    font-weight: 700;
    font-size: 1.05em;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
    transition: background 0.2s;
  }
  .accordion-header:hover { background: var(--c-bg-surface-alt); }
  .accordion-header::-webkit-details-marker { display: none; }
  summary:focus { outline: none; }
  summary::marker, summary::-webkit-details-marker {
    transition: transform 0.3s ease;
  }
  .accordion-header::after {
    content: '';
    margin-left: auto;
    width: 7px;
    height: 7px;
    border-right: 2px solid var(--c-accent);
    border-bottom: 2px solid var(--c-accent);
    transform: rotate(-45deg);
    transition: transform 0.35s ease;
    flex-shrink: 0;
  }
  details[open] > .accordion-header::after {
    transform: rotate(45deg);
  }
  details .accordion-content {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }
  details .accordion-content > * {
    overflow: hidden;
  }
  details[open] .accordion-content {
    grid-template-rows: 1fr;
    opacity: 1;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    margin: 24px 0;
    border-radius: var(--c-radius);
    border: 1px solid var(--c-border);
    box-shadow: var(--c-shadow);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.95em;
  }
  th {
    background: var(--c-bg-surface-alt);
    font-family: var(--c-font);
    font-weight: 700;
    text-align: left;
    padding: 14px 18px;
    font-size: 0.9em;
    color: var(--c-text);
    border-bottom: 2px solid var(--c-border);
  }
  td {
    padding: 12px 18px;
    border-bottom: 1px solid var(--c-border-light);
  }
  tr:nth-child(even) td { background: var(--c-table-stripe); }
  tr:hover td {
    background: var(--c-table-hover);
    transition: background 0.15s;
  }
  tr:last-child td { border-bottom: none; }

  /* Tabs — no text animation, smooth underline only */
  .tabs { margin: 28px 0; }
  .tab-radio { display: none; }
  .tab-header {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--c-border);
    margin-bottom: 0;
  }
  .tab-btn {
    flex: 1;
    text-align: center;
    padding: 12px 16px;
    cursor: pointer;
    font-weight: 500;
    font-size: 0.95em;
    transition: color 0.25s ease, border-bottom-color 0.25s ease;
    color: var(--c-text-secondary);
    user-select: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }
  .tab-btn:hover { color: var(--c-text); }
  .tab-panel {
    display: none;
    padding: 22px;
    background: var(--c-bg-surface);
    border: 1px solid var(--c-border);
    border-top: none;
    border-radius: 0 0 var(--c-radius) var(--c-radius);
    animation: tabFade 0.3s ease;
  }
  @keyframes tabFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Tab group 1 */
  #t1-1:checked ~ .tab-header label[for="t1-1"],
  #t1-2:checked ~ .tab-header label[for="t1-2"],
  #t1-3:checked ~ .tab-header label[for="t1-3"],
  #t1-4:checked ~ .tab-header label[for="t1-4"],
  #t1-5:checked ~ .tab-header label[for="t1-5"] {
    color: var(--c-accent);
    border-bottom-color: var(--c-tab-active-border);
    font-weight: 700;
  }
  #t1-1:checked ~ #p1-1,
  #t1-2:checked ~ #p1-2,
  #t1-3:checked ~ #p1-3,
  #t1-4:checked ~ #p1-4,
  #t1-5:checked ~ #p1-5 { display: block; }

  /* Tab group 2 */
  #t2-1:checked ~ .tab-header label[for="t2-1"],
  #t2-2:checked ~ .tab-header label[for="t2-2"],
  #t2-3:checked ~ .tab-header label[for="t2-3"],
  #t2-4:checked ~ .tab-header label[for="t2-4"],
  #t2-5:checked ~ .tab-header label[for="t2-5"] {
    color: var(--c-accent);
    border-bottom-color: var(--c-tab-active-border);
    font-weight: 700;
  }
  #t2-1:checked ~ #p2-1,
  #t2-2:checked ~ #p2-2,
  #t2-3:checked ~ #p2-3,
  #t2-4:checked ~ #p2-4,
  #t2-5:checked ~ #p2-5 { display: block; }

  /* Tab group 3 */
  #t3-1:checked ~ .tab-header label[for="t3-1"],
  #t3-2:checked ~ .tab-header label[for="t3-2"],
  #t3-3:checked ~ .tab-header label[for="t3-3"],
  #t3-4:checked ~ .tab-header label[for="t3-4"],
  #t3-5:checked ~ .tab-header label[for="t3-5"] {
    color: var(--c-accent);
    border-bottom-color: var(--c-tab-active-border);
    font-weight: 700;
  }
  #t3-1:checked ~ #p3-1,
  #t3-2:checked ~ #p3-2,
  #t3-3:checked ~ #p3-3,
  #t3-4:checked ~ #p3-4,
  #t3-5:checked ~ #p3-5 { display: block; }

  /* Card */
  .card {
    background: var(--c-bg-surface);
    border: 1px solid var(--c-border);
    border-radius: var(--c-radius);
    padding: 24px 28px;
    margin: 24px 0;
    box-shadow: var(--c-shadow);
    position: relative;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: var(--c-shadow-hover); }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--c-accent);
    border-radius: var(--c-radius) var(--c-radius) 0 0;
  }
  .card-title {
    font-family: var(--c-font);
    font-weight: 700;
    font-size: 1.15em;
    margin-bottom: 10px;
    color: var(--c-accent-dark);
  }
  .card-body {
    color: var(--c-text-secondary);
    line-height: 1.7;
  }

  /* Blockquote (editorial style) */
  blockquote {
    position: relative;
    margin: 28px 0;
    padding: 20px 24px 20px 48px;
    font-family: var(--c-font);
    font-size: 1.1em;
    font-style: italic;
    color: var(--c-text-secondary);
    border-left: none;
    line-height: 1.7;
  }
  blockquote::before {
    content: '\201C';
    position: absolute;
    left: 0;
    top: -4px;
    font-size: 4em;
    font-family: var(--c-font);
    color: var(--c-quote-mark);
    line-height: 1;
  }

  /* Sources */
  .sources {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--c-hr-color);
  }
  .sources-title {
    font-family: var(--c-font);
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--c-text-secondary);
    font-weight: 700;
    margin-bottom: 12px;
  }
  .source-link {
    display: inline-block;
    padding: 8px 16px;
    background: var(--c-source-bg);
    border-radius: var(--c-radius-sm);
    margin: 4px 6px 4px 0;
    font-size: 0.9em;
    transition: background 0.2s;
    text-decoration: none;
  }
  .source-link:hover {
    background: var(--c-source-hover);
    text-decoration: none;
  }

  a[href*="google.com/maps"] {
    color: var(--c-geo-color);
    font-weight: 600;
  }

  @media (max-width: 480px) {
    body { font-size: 16px; padding: 20px 14px; }
    h1 { font-size: 1.7em; }
    h2 { font-size: 1.3em; margin-top: 36px; }
    .tab-btn { padding: 10px 8px; font-size: 0.85em; }
    th, td { padding: 10px 14px; }
    .card { padding: 20px; }
    blockquote { padding-left: 36px; font-size: 1em; }
    blockquote::before { font-size: 3em; }
  }
</style>
</head>
<body>

{{CONTENT}}

<footer style="margin-top: 3rem; padding: 1.5rem; text-align: center; border-top: 1px solid var(--c-border);">
  <span style="color: var(--c-text-secondary); font-size: 0.85rem;">Страница сгенерирована в </span>
  <a href="https://t.me/AltMeBot" target="_blank" rel="noopener" style="color: var(--c-accent); text-decoration: none; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.3rem;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/>
    </svg>
    @AltMeBot
  </a>
</footer>

</body>
</html>
